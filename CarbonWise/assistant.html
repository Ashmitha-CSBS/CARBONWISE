<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Eco Assistant</title>

<link rel="stylesheet" href="css/style.css">

<style>

.chat-container{
max-width:900px;
margin:50px auto;
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
overflow:hidden;
}

.chat-header{
background:linear-gradient(45deg,#00c853,#00e676);
padding:20px;
color:white;
text-align:center;
font-size:24px;
font-weight:600;
}

.chat-box{
height:500px;
overflow-y:auto;
padding:20px;
background:#f8fdf8;
}

.bot-message{
background:#e8fff1;
padding:15px;
border-radius:15px;
margin-bottom:15px;
max-width:75%;
}

.user-message{
background:#dff6ff;
padding:15px;
border-radius:15px;
margin-left:auto;
margin-bottom:15px;
max-width:75%;
}

.input-area{
display:flex;
padding:20px;
gap:10px;
background:white;
}

.input-area input{
flex:1;
padding:15px;
border:2px solid #ddd;
border-radius:12px;
}

.input-area button{
padding:15px 25px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
cursor:pointer;
font-weight:600;
}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
🌱 CarbonWise
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="calculator.html">Calculator</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="assistant.html">AI Assistant</a></li>
<li><a href="challenges.html">Challenges</a></li>
<li><a href="leaderboard.html">Leaderboard</a></li>
</ul>

</nav>

<div class="chat-container">

<div class="chat-header">
🤖 CarbonWise AI Assistant
</div>

<div class="chat-box" id="chatBox">

<div class="bot-message">
Hello 👋 I'm your Eco Assistant.
Ask me how to reduce your carbon footprint.
</div>

</div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask about sustainability...">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script src="js/assistant.js"></script>

</body>
</html>
