<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbonWise Challenges</title>

<link rel="stylesheet" href="css/style.css">

<style>

.challenge-section{
padding:60px 8%;
}

.challenge-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.challenge-card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.challenge-card:hover{
transform:translateY(-8px);
}

.challenge-card button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
cursor:pointer;
font-size:16px;
}

.challenge-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
margin-bottom:15px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:20px;
width:350px;
text-align:center;
}

.modal-content input{
margin-top:15px;
}

.modal-content button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
cursor:pointer;
}

@media(max-width:900px){

.challenge-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
🌱 CarbonWise
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="calculator.html">Calculator</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="assistant.html">AI Assistant</a></li>
<li><a href="challenges.html">Challenges</a></li>
<li><a href="leaderboard.html">Leaderboard</a></li>
</ul>

</nav>

<section class="challenge-section">

<h1 style="text-align:center;margin-bottom:40px;">
🏆 Eco Challenges
</h1>

<div class="challenge-grid">

<div class="challenge-card">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800">
<h3>Walk Instead of Drive</h3>
<p>Earn 10 Points</p>
<button onclick="openUpload(this)">
Upload Proof
</button>
</div>

<div class="challenge-card">
<img src="https://images.unsplash.com/photo-1497436072909-60f360e1d4b1?w=800">
<h3>Save Electricity</h3>
<p>Earn 10 Points</p>
<button onclick="openUpload(this)">
Upload Proof
</button>
</div>

<div class="challenge-card">
<img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800">
<h3>Plant a Tree</h3>
<p>Earn 10 Points</p>
<button onclick="openUpload(this)">
Upload Proof
</button>
</div>

</div>

<h2 style="text-align:center;margin-top:40px;">
Points: <span id="points">0</span>
</h2>

</section>

<div id="uploadModal" class="modal">

<div class="modal-content">

<h2>📸 Upload Proof</h2>

<input type="file" id="proofImage" accept="image/*">

<br>

<button onclick="verifyTask()">
Submit Proof
</button>

<button onclick="closeModal()">
Cancel
</button>

</div>

</div>

<script src="js/challenges.js"></script>

</body>
</html>
