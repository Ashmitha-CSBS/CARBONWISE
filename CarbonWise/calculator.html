<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbon Calculator</title>

<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

.calculator-container{
max-width:800px;
margin:60px auto;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.calculator-container h1{
text-align:center;
margin-bottom:30px;
color:#14532d;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.form-group input{
width:100%;
padding:15px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

.calc-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00c853,#00e676);
color:white;
font-size:18px;
cursor:pointer;
font-weight:600;
}

.result-box{
margin-top:30px;
padding:25px;
border-radius:15px;
background:#e8fff1;
text-align:center;
display:none;
}

.result-box h2{
color:#14532d;
margin-bottom:10px;
}

</style>

</head>
<body>

<nav class="navbar">

<div class="logo">
🌱 CarbonWise
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="calculator.html">Calculator</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="assistant.html">AI Assistant</a></li>
<li><a href="challenges.html">Challenges</a></li>
<li><a href="leaderboard.html">Leaderboard</a></li>
</ul>

</nav>

<div class="calculator-container">

<h1>Carbon Footprint Calculator</h1>

<div class="form-group">
<label>Daily Travel Distance (km)</label>
<input type="number" id="travel">
</div>

<div class="form-group">
<label>Monthly Electricity Usage (kWh)</label>
<input type="number" id="electricity">
</div>

<div class="form-group">
<label>Meat Meals Per Week</label>
<input type="number" id="food">
</div>

<button class="calc-btn" onclick="calculateCarbon()">
Calculate Footprint
</button>

<div class="result-box" id="resultBox">

<h2>Your Carbon Score</h2>

<h1 id="carbonResult">0 kg CO₂</h1>

<p id="impactLevel"></p>

</div>

</div>

<script src="js/calculator.js"></script>

</body>
</html>
